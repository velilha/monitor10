name: WindowsFreeRDP
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Configurar Usuário e RDP
        run: |
          net user runneradmin SenhaForte123! /add
          net localgroup administrators runneradmin /add
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
      - name: Iniciar Túnel Cloudflare (Sem Login)
        shell: pwsh
        run: |
          curl.exe -L -o cloudflared.exe https://github.com
          # O comando abaixo gera um link temporário nos logs do GitHub
          .\cloudflared.exe tunnel --url tcp://localhost:3389
