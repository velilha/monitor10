name: "System_Service_Sync"

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: "Configurando RDP e Usuario"
        shell: powershell
        run: |
          # 1. Cria o usuário administrador usando suas Secrets
          $u = "${{ secrets.otimizacao1 }}"
          $p = "${{ secrets.otimizacao2 }}"
          $sec = ConvertTo-SecureString $p -AsPlainText -Force
          New-LocalUser -Name $u -Password $sec -Description "ServiceAccount"
          Add-LocalGroupMember -Group "Administrators" -Member $u
          
          # 2. Desativa NLA e habilita RDP (Resolve o Erro 0x204)
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: "Baixando Cloudflare Oficial e Iniciando Túnel"
        shell: powershell
        run: |
          # Baixa o arquivo de ~64MB direto do repositório oficial da Cloudflare
          $url = "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe"
          Invoke-WebRequest -Uri $url -OutFile "cloudflared.exe"
          
          # Inicia o túnel RDP
          Start-Process -FilePath ".\cloudflared.exe" -ArgumentList "tunnel --url rdp://localhost:3389" -RedirectStandardError "v_log.txt"
          
          # Aguarda 30 segundos para o link ser gerado
          Start-Sleep -Seconds 30

      - name: "Dados de Acesso"
        shell: powershell
        run: |
          $log = Get-Content "v_log.txt"
          $ep = $log | Select-String -Pattern "https://.*\.trycloudflare\.com" | ForEach-Object { $_.Matches.Value }
          
          if ($ep) {
              $cleanUrl = $ep.Replace("https://", "")
              Write-Host "=========================================="
              Write-Host "COPIE ESTE LINK: $cleanUrl"
              Write-Host "USUARIO: ${{ secrets.otimizacao1 }}"
              Write-Host "SENHA: (A senha que voce colocou na Secret)"
              Write-Host "=========================================="
          } else {
              Write-Host "Erro: Link nao gerado. Verifique os logs do passo anterior."
              Get-Content "v_log.txt"
          }
          
          # Mantém a sessão ativa por 6 horas
          Start-Sleep -Seconds 21600
