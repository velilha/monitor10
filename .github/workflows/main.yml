name: "Windows_Native_2022_RDP"

on:
  workflow_dispatch: # Permite iniciar manualmente

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: "1. Preparando Sistema e Usuario"
        shell: powershell
        run: |
          # Define Usuario e Senha (pegando das suas Secrets)
          $User = "${{ secrets.otimizacao1 }}"
          $Pass = "${{ secrets.otimizacao2 }}"
          $SecPass = ConvertTo-SecureString $Pass -AsPlainText -Force
          
          # Cria o usuario e coloca como Administrador
          Write-Host "Criando usuario..."
          New-LocalUser -Name $User -Password $SecPass -Description "RDP User"
          Add-LocalGroupMember -Group "Administrators" -Member $User
          
          # Configura RDP Nativo: Habilita conexao e desativa NLA (Crucial)
          Write-Host "Configurando Registro do Windows..."
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0
          
          # Abre as portas no Firewall nativo
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: "2. Instalando Bridge Cloudflare"
        shell: powershell
        run: |
          Write-Host "Baixando Cloudflared..."
          $url = "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe"
          Invoke-WebRequest -Uri $url -OutFile "cloudflared.exe"
          
          Write-Host "Iniciando tunel de comunicacao..."
          Start-Process -FilePath ".\cloudflared.exe" -ArgumentList "tunnel --url rdp://localhost:3389" -RedirectStandardError "output.log"
          
          # Aguarda o tunel ser estabelecido
          Start-Sleep -Seconds 30

      - name: "3. Gerando Link de Acesso"
        shell: powershell
        run: |
          $log = Get-Content "output.log"
          $link = $log | Select-String -Pattern "https://.*\.trycloudflare\.com" | ForEach-Object { $_.Matches.Value }
          
          if ($link) {
              $cleanLink = $link.Replace("https://", "")
              Write-Host "`n===================================================="
              Write-Host "SERVIDOR PRONTO PARA CONEXAO!"
              Write-Host "COPIE ESTE ENDERECO: $cleanLink"
              Write-Host "USUARIO: ${{ secrets.otimizacao1 }}"
              Write-Host "====================================================`n"
          } else {
              Write-Host "Erro: O link nao foi gerado. Verifique os logs."
              Get-Content "output.log"
          }
          
          # Mantem o workflow rodando (6 horas)
          Start-Sleep -Seconds 21600
