name: "Cloudflare_RDP_Direct"

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: "1. Criando Usuario"
        shell: powershell
        run: |
          $u = "${{ secrets.otimizacao1 }}"
          $p = "${{ secrets.otimizacao2 }}"
          $sec = ConvertTo-SecureString $p -AsPlainText -Force
          New-LocalUser -Name $u -Password $sec
          Add-LocalGroupMember -Group "Administrators" -Member $u

      - name: "2. Habilitando RDP no Registro"
        shell: powershell
        run: |
          # Apenas o essencial para o Windows aceitar a conexao vinda do tunel
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: "3. Iniciando Tunel com seu Arquivo"
        shell: powershell
        run: |
          # Baixando o Cloudflared oficial (ja que voce confirmou que o arquivo de ~64MB e este)
          Invoke-WebRequest -Uri "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -OutFile "cloudflared.exe"
          
          # Inicia o processo
          Start-Process -FilePath ".\cloudflared.exe" -ArgumentList "tunnel --url rdp://localhost:3389" -RedirectStandardError "log.txt"
          
          # Espera 45 segundos (importante para o link propagar na rede)
          Start-Sleep -Seconds 45

      - name: "4. Exibir Link"
        shell: powershell
        run: |
          $log = Get-Content "log.txt"
          $link = $log | Select-String -Pattern "https://.*\.trycloudflare\.com" | ForEach-Object { $_.Matches.Value }
          Write-Host "=========================================="
          Write-Host "LINK: $link"
          Write-Host "=========================================="
          Start-Sleep -Seconds 21600
