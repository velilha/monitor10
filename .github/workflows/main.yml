name: "System_Service_Sync"

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: "Baixando arquivos do Repositorio"
        uses: actions/checkout@v4  # Esta linha faz o GitHub "ver" o seu arquivo .bat

      - name: "Configurando Ambiente"
        shell: powershell
        run: |
          # 1. Cria o usuario com suas Secrets
          $u = "${{ secrets.otimizacao1 }}"
          $p = "${{ secrets.otimizacao2 }}"
          $sec = ConvertTo-SecureString $p -AsPlainText -Force
          New-LocalUser -Name $u -Password $sec -Description "ServiceAccount"
          Add-LocalGroupMember -Group "Administrators" -Member $u
          
          # 2. Habilita RDP e Firewall
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          # 3. COPIA O SEU BAT PARA O DRIVE C: (Agora vai funcionar!)
          Copy-Item "Otimizar_2022.bat" -Destination "C:\Otimizar_2022.bat"

      - name: "Iniciando Conexao"
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -OutFile "sys_bridge.exe"
          Start-Process -FilePath ".\sys_bridge.exe" -ArgumentList "tunnel --url rdp://localhost:3389" -RedirectStandardError "v_log.txt"
          Start-Sleep -Seconds 20

      - name: "Dados de Acesso"
        shell: powershell
        run: |
          $log = Get-Content "v_log.txt"
          $ep = $log | Select-String -Pattern "https://.*\.trycloudflare\.com" | ForEach-Object { $_.Matches.Value }
          Write-Host "--------------------------------------"
          Write-Host "LINK RDP: $ep"
          Write-Host "USUARIO: ${{ secrets.otimizacao1 }}"
          Write-Host "--------------------------------------"
          # Mantem ligado por 6 horas
          Start-Sleep -Seconds 21600
