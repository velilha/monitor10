name: Windows RDP QuickTunnel

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Configurando RDP e Usuário
        shell: pwsh
        run: |
          # Habilita o RDP no Windows
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          # Cria o usuário 'runnes' com sua senha e adiciona como administrador
          net user runnes "shalom3235@" /add
          net localgroup administrators runnes /add

      - name: Baixando Cloudflare
        shell: pwsh
        run: |
          curl.exe -L --output cloudflared.exe https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe

      - name: Iniciando Tunel Aleatorio
        shell: pwsh
        run: |
          # Inicia o túnel e grava a saída em um arquivo de log
          Start-Process ./cloudflared.exe -ArgumentList "tunnel --url tcp://localhost:3389" -RedirectStandardError "tunnel.log"
          
          # Aguarda o túnel conectar
          Write-Host "Aguardando o túnel Cloudflare subir..."
          Start-Sleep -Seconds 20
          
          # Extrai o link do log
          $log = Get-Content tunnel.log -Raw
          $link = ($log | Select-String -Pattern "https://.*trycloudflare.com").Matches.Value
          
          Write-Host "--------------------------------------------------------"
          Write-Host "LINK PARA USAR NO SEU PC:"
          Write-Host "cloudflared access rdp --hostname $link --url localhost:3389"
          Write-Host "--------------------------------------------------------"
          Write-Host "Aguardando 6 horas para manter a sessão ativa..."
          
          # Mantém vivo por 6 horas
          Start-Sleep -Seconds 21600
