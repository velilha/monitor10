name: Windows RDP QuickTunnel

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Configurando RDP e Usuário
        shell: pwsh
        run: |
          # Habilita o RDP
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          # Define a senha do administrador
          net user runneradmin "SenhaSegura123!"

      - name: Baixando Cloudflare
        shell: pwsh
        run: |
          curl.exe -L --output cloudflared.exe https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe

      - name: Iniciando Túnel Aleatório
        shell: pwsh
        run: |
          Write-Host "Gerando link aleatório... Aguarde 10 segundos."
          
          # Inicia o túnel e joga o log para um arquivo para pegarmos o link
          Start-Process ./cloudflared.exe -ArgumentList "tunnel --url tcp://localhost:3389" -RedirectStandardError "tunnel.log"
          
          # Aguarda o túnel estabilizar
          Start-Sleep -Seconds 15
          
          # Procura o link aleatório no log e exibe no console do GitHub
          $link = Get-Content tunnel.log | Select-String "trycloudflare.com"
          Write-Host "--------------------------------------------------------"
          Write-Host "CONECTE-SE USANDO O COMANDO ABAIXO NO SEU PC:"
          Write-Host "cloudflared access rdp --hostname $link --url localhost:3389"
          Write-Host "--------------------------------------------------------"
          
          # Mantém vivo
          Start-Sleep -Seconds 21600
