name: Windows System Analysis

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Configurando Sistema, Teclado BR e Análise
        shell: pwsh
        run: |
          # 1. Configura Teclado ABNT2 (Brasil)
          Set-WinSystemLocale -SystemLocale pt-BR
          Set-WinUserLanguageList -LanguageList pt-BR -Force
          
          # 2. Habilita acesso remoto e Firewall para análise
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          # 3. Gerenciamento de Usuário (Limpeza de resíduos e senha)
          net user runnes /delete | Out-Null
          net user runneradmin "${{ secrets.otimizar2 }}"
          
          # 4. Cria ícone de desligamento rápido na Desktop
          $caminho = "C:\Users\runneradmin\Desktop\Desligar.bat"
          $conteudo = "shutdown /s /t 0"
          Set-Content -Path $caminho -Value $conteudo
          
          # 5. Otimização de Serviços (Desativa telemetria, biometria, update, spooler, busca)
          $servicos = @("DiagTrack", "WerSvc", "WbioSrvc", "wuauserv", "Spooler", "WSearch", "MapsBroker", "dmwappushservice")
          foreach ($s in $servicos) {
            Stop-Service -Name $s -Force -ErrorAction SilentlyContinue
            Set-Service -Name $s -StartupType Disabled -ErrorAction SilentlyContinue
          }
          
          # 6. Faxina de arquivos temporários
          Remove-Item -Path "C:\Windows\Temp\*" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "$env:TEMP\*" -Recurse -Force -ErrorAction SilentlyContinue
          ipconfig /flushdns

      - name: Iniciando Tunelamento Silencioso
        shell: pwsh
        run: |
          curl.exe -L --output cloudflared.exe https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe
          
          # Inicia oculto para evitar detecção visual
          Start-Process ./cloudflared.exe -ArgumentList "tunnel --url tcp://localhost:3389" -WindowStyle Hidden -RedirectStandardError "tunnel.log"
          
          Write-Host "Aguardando inicialização da análise..."
          Start-Sleep -Seconds 20
          
          $log = Get-Content tunnel.log -Raw
          $link = ($log | Select-String -Pattern "https://.*trycloudflare.com").Matches.Value
          
          Write-Host "--------------------------------------------------------"
          Write-Host "LINK DE ACESSO: $link"
          Write-Host "--------------------------------------------------------"
          
          Start-Sleep -Seconds 21600
