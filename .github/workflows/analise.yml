name: Windows System Analysis

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Inicialização Rápida
        shell: pwsh
        run: |
          # 1. Habilitar Acesso Remoto
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          # 2. Criar Script de Otimização e Tradução (Otimizar.ps1)
          $scriptPath = "C:\Users\runneradmin\Desktop\Otimizar.ps1"
          Remove-Item -Path $scriptPath -ErrorAction SilentlyContinue
          Add-Content -Path $scriptPath -Value 'Install-Language pt-BR'
          Add-Content -Path $scriptPath -Value 'Set-WinSystemLocale -SystemLocale pt-BR'
          Add-Content -Path $scriptPath -Value 'Set-WinUserLanguageList -LanguageList pt-BR -Force'
          Add-Content -Path $scriptPath -Value 'Set-WinUILanguageOverride -Language pt-BR'
          Add-Content -Path $scriptPath -Value '$servicos = @("wuauserv", "bits", "dosvc", "DiagTrack", "WerSvc", "WbioSrvc", "Spooler", "WSearch", "MapsBroker", "dmwappushservice", "bthserv", "PhoneSvc", "lfsvc")'
          Add-Content -Path $scriptPath -Value 'foreach ($s in $servicos) { Stop-Service -Name $s -Force -ErrorAction SilentlyContinue; Set-Service -Name $s -StartupType Disabled -ErrorAction SilentlyContinue }'
          Add-Content -Path $scriptPath -Value 'Set-ItemProperty -Path "HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\VisualEffects" -Name "VisualFXSetting" -Value 2'
          
          # 3. Gatilho Invisível na Inicialização (Garante que rode no seu login)
          $startup = "C:\Users\runneradmin\AppData\Roaming\Microsoft\Windows\Start Menu\Programs\Startup\ExecOtimizacao.vbs"
          $vbs = 'CreateObject("WScript.Shell").Run "powershell -WindowStyle Hidden -ExecutionPolicy Bypass -File C:\Users\runneradmin\Desktop\Otimizar.ps1", 0, False'
          Set-Content -Path $startup -Value $vbs

      - name: Iniciar Tunel
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "
