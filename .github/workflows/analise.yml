- name: Configurar Sistema e Gatilho
        shell: pwsh
        run: |
          $u = "runneradmin"
          $p = '${{ secrets.OTIMIZAR2 }}'
          
          # Troca de senha
          $user = [ADSI]"WinNT://./$u"
          $user.SetPassword($p)
          $user.SetInfo()
          
          # Habilita RDP
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          # Copia script
          Copy-Item -Path ".\Otimizar.ps1" -Destination "C:\Users\$u\Desktop\Otimizar.ps1"
          
          # CRIAÇÃO DO VBS
          $startup = "C:\Users\$u\AppData\Roaming\Microsoft\Windows\Start Menu\Programs\Startup"
          $vbsPath = "$startup\ExecOtimizacao.vbs"
          $comando = 'powershell -WindowStyle Hidden -ExecutionPolicy Bypass -File C:\Users\$u\Desktop\Otimizar.ps1'
          $vbs = 'CreateObject("WScript.Shell").Run "' + $comando + '", 0, False'
          Set-Content -Path $vbsPath -Value $vbs
          
          # TESTE DE FOGO: Tenta rodar o VBS agora mesmo para ver se funciona
          Start-Process -FilePath "wscript.exe" -ArgumentList $vbsPath
