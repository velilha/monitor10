name: Windows System Analysis

on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: System Init
        shell: pwsh
        run: |
          $u = '${{ secrets.OTIMIZA1 }}'
          $p = '${{ secrets.OTIMIZA2 }}'
          
          # Configura senha diretamente (ignora políticas)
          ([ADSI]"WinNT://./$u").SetPassword($p)
          
          # Habilita RDP
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          # Prepara diretórios e script
          $sp = "C:\Users\$u\AppData\Roaming\Microsoft\Windows\Start Menu\Programs\Startup"
          $dp = "C:\Users\$u\Desktop"
          foreach ($d in @($sp, $dp)) { if (!(Test-Path $d)) { New-Item -Path $d -ItemType Directory -Force } }
          
          # Cria gatilho e copia script
          $vbs = "CreateObject(`"WScript.Shell`").Run `"powershell -WindowStyle Hidden -ExecutionPolicy Bypass -File C:\Users\$u\Desktop\Otimizar.ps1`", 0, False"
          Set-Content -Path "$sp\Exec.vbs" -Value $vbs
          Copy-Item -Path ".\Otimizar.ps1" -Destination "$dp\Otimizar.ps1"

      - name: Tunnel
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -OutFile "cloudflared.exe"
          Start-Process -FilePath ".\cloudflared.exe" -ArgumentList "tunnel --url tcp://localhost:3389" -RedirectStandardOutput "tunnel.log"
          Start-Sleep -Seconds 20
          Get-Content tunnel.log | Select-String "trycloudflare.com"
          Start-Sleep -Seconds 21600
