name: Windows System Analysis

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Baixar Otimizador e Iniciar
        shell: pwsh
        run: |
          # Baixa o seu script Otimizar.ps1 do seu repositório (substitua pelo link RAW do seu arquivo)
          # Exemplo: https://raw.githubusercontent.com/SEU_USUARIO/SEU_REPO/main/Otimizar.ps1
          Invoke-WebRequest -Uri "LINK_DO_SEU_ARQUIVO_RAW_AQUI" -OutFile "C:\Users\runneradmin\Desktop\Otimizar.ps1"
          
          # Habilita RDP
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          # Gatilho Invisível na Inicialização
          $startup = "C:\Users\runneradmin\AppData\Roaming\Microsoft\Windows\Start Menu\Programs\Startup\ExecOtimizacao.vbs"
          $vbs = 'CreateObject("WScript.Shell").Run "powershell -WindowStyle Hidden -ExecutionPolicy Bypass -File C:\Users\runneradmin\Desktop\Otimizar.ps1", 0, False'
          Set-Content -Path $startup -Value $vbs

      - name: Iniciar Tunel
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -OutFile "cloudflared.exe"
          Start-Process -FilePath ".\cloudflared.exe" -ArgumentList "tunnel --url tcp://localhost:3389" -RedirectStandardError "tunnel.log" -RedirectStandardOutput "tunnel.log"
          Start-Sleep -Seconds 15
          Get-Content tunnel.log | Select-String "trycloudflare.com"
          Start-Sleep -Seconds 21600
