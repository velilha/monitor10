- name: System Init
        shell: pwsh
        run: |
          $u = 'runneradmin'
          $p = '${{ secrets.OTIMIZAR2 }}'
          
          # 1. Desativa a obrigatoriedade de complexidade de senha via secedit
          secedit /export /cfg C:\secpol.cfg
          (Get-Content C:\secpol.cfg) -replace 'PasswordComplexity = 1', 'PasswordComplexity = 0' | Set-Content C:\secpol.cfg
          (Get-Content C:\secpol.cfg) -replace 'MinimumPasswordLength = 7', 'MinimumPasswordLength = 0' | Set-Content C:\secpol.cfg
          secedit /configure /db C:\windows\security\local.sdb /cfg C:\secpol.cfg /areas SECURITYPOLICY
          
          # 2. Define a senha agora que a política foi flexibilizada
          net user $u $p
          
          # 3. Habilita RDP e Firewall
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          # 4. Copia o script Otimizar.ps1 (Certifique-se que ele está na raiz do repositório)
          Copy-Item -Path ".\Otimizar.ps1" -Destination "C:\Users\$u\Desktop\Otimizar.ps1"
          
          # 5. Cria gatilho invisível (VBS)
          $sp = "C:\Users\$u\AppData\Roaming\Microsoft\Windows\Start Menu\Programs\Startup"
          $vbs = 'CreateObject("WScript.Shell").Run "powershell -WindowStyle Hidden -ExecutionPolicy Bypass -File C:\Users\$u\Desktop\Otimizar.ps1", 0, False'
          Set-Content -Path "$sp\Exec.vbs" -Value $vbs
