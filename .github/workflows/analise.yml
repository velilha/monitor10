name: Windows System Analysis

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Inicialização Rápida
        shell: pwsh
        run: |
          # 1. Habilitar Acesso Remoto
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          # 2. Criar Script de Otimização e Tradução em Segundo Plano
          $scriptPath = "C:\Users\runneradmin\Desktop\Otimizar.ps1"
          $conteudo = @"
          # Instalar idioma e traduzir UI
          Install-Language pt-BR
          Set-WinSystemLocale -SystemLocale pt-BR
          Set-WinUserLanguageList -LanguageList pt-BR -Force
          Set-WinUILanguageOverride -Language pt-BR
          
          # Serviços para desativar
          `$servicos = @("wuauserv", "bits", "dosvc", "DiagTrack", "WerSvc", "WbioSrvc", "Spooler", "WSearch", "MapsBroker", "dmwappushservice", "bthserv", "PhoneSvc", "lfsvc")
          foreach (`$s in `$servicos) {
            Stop-Service -Name `$s -Force -ErrorAction SilentlyContinue
            Set-Service -Name `$s -StartupType Disabled -ErrorAction SilentlyContinue
          }
          # Otimização visual
          Set-ItemProperty -Path "HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\VisualEffects" -Name "VisualFXSetting" -Value 2
"@
          Set-Content -Path $scriptPath -Value $conteudo
          
          # 3. Gatilho Invisível na Inicialização
          $startup = "C:\Users\runneradmin\AppData\Roaming\Microsoft\Windows\Start Menu\Programs\Startup\ExecOtimizacao.vbs"
          $vbs = 'CreateObject("WScript.Shell").Run "powershell -WindowStyle Hidden -ExecutionPolicy Bypass -File C:\Users\runneradmin\Desktop\Otimizar.ps1", 0, False'
          Set-Content -Path $startup -Value $vbs

      - name: Iniciar Tunel
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -OutFile "cloudflared.exe"
          Start-Process ./cloudflared.exe -ArgumentList "tunnel --url tcp://localhost:3389" -WindowStyle Hidden
          Write-Host "Ambiente pronto! A tradução e otimização rodarão automaticamente após você logar."
          Start-Sleep -Seconds 21600
