name: Windows System Analysis

on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Acesso
        shell: pwsh
        run: |
          # 1. Troca a senha do runneradmin sem secedit (menos erro)
          $p = '${{ secrets.OTIMIZAR2 }}'
          net user runneradmin $p
          
          # 2. Habilita RDP e Firewall (Obrigatório)
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          # 3. Copia o script
          Copy-Item -Path ".\Otimizar.ps1" -Destination "C:\Users\runneradmin\Desktop\Otimizar.ps1"
          
          # 4. Gatilho (Testaremos via comando direto)
          $startup = "C:\Users\runneradmin\AppData\Roaming\Microsoft\Windows\Start Menu\Programs\Startup"
          $vbs = 'CreateObject("WScript.Shell").Run "powershell -WindowStyle Hidden -ExecutionPolicy Bypass -File C:\Users\runneradmin\Desktop\Otimizar.ps1", 0, False'
          Set-Content -Path "$startup\Exec.vbs" -Value $vbs

      - name: Iniciar Tunel
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -OutFile "cloudflared.exe"
          Start-Process -FilePath ".\cloudflared.exe" -ArgumentList "tunnel --url tcp://localhost:3389" -RedirectStandardOutput "tunnel.log"
          Start-Sleep -Seconds 30
          Get-Content tunnel.log | Select-String "trycloudflare.com"
          Start-Sleep -Seconds 21600
