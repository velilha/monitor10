name: Windows System Analysis

on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Acesso e Otimizar
        shell: pwsh
        run: |
          # 1. Troca a senha do runneradmin
          $p = '${{ secrets.OTIMIZAR2 }}'
          net user runneradmin $p
          
          # 2. Habilita RDP e Firewall
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          # 3. Executa o Otimizar.ps1 diretamente aqui
          # O GitHub aguarda o término e garante permissão total
          & ".\Otimizar.ps1"

      - name: Iniciar Tunel
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -OutFile "cloudflared.exe"
          Start-Process -FilePath ".\cloudflared.exe" -ArgumentList "tunnel --url tcp://localhost:3389" -RedirectStandardOutput "tunnel.log"
          Start-Sleep -Seconds 20
          Get-Content tunnel.log | Select-String "trycloudflare.com"
          Start-Sleep -Seconds 21600
