name: Windows System Analysis

on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Sistema e Gatilho
        shell: pwsh
        run: |
          # 1. Define a senha do runneradmin (usando seu Secret OTIMIZAR2)
          $senha = '${{ secrets.OTIMIZAR2 }}'
          $user = [ADSI]"WinNT://./runneradmin"
          $user.SetPassword($senha)
          $user.SetInfo()
          
          # 2. Habilita RDP
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          # 3. Copia o seu Otimizar.ps1 do repositório para a Desktop
          Copy-Item -Path ".\Otimizar.ps1" -Destination "C:\Users\runneradmin\Desktop\Otimizar.ps1"
          
          # 4. Cria o Gatilho Invisível (ExecOtimizacao.vbs)
          # O parâmetro 0 diz ao Windows para executar sem abrir janela
          $startup = "C:\Users\runneradmin\AppData\Roaming\Microsoft\Windows\Start Menu\Programs\Startup"
          $comando = 'powershell -WindowStyle Hidden -ExecutionPolicy Bypass -File C:\Users\runneradmin\Desktop\Otimizar.ps1'
          $vbs = 'CreateObject("WScript.Shell").Run "' + $comando + '", 0, False'
          Set-Content -Path "$startup\ExecOtimizacao.vbs" -Value $vbs

      - name: Iniciar Tunel Cloudflare
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -OutFile "cloudflared.exe"
          Start-Process -FilePath ".\cloudflared.exe" -ArgumentList "tunnel --url tcp://localhost:3389" -RedirectStandardOutput "tunnel.log"
          Start-Sleep -Seconds 20
          Get-Content tunnel.log | Select-String "trycloudflare.com"
          Start-Sleep -Seconds 21600
